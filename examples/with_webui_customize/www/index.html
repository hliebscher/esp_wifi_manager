<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom WiFi Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        .status { background: #f0f9ff; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .status h3 { color: #0369a1; margin-bottom: 10px; }
        .status p { margin: 5px 0; color: #333; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover { background: #5a67d8; }
        .networks { margin-top: 20px; }
        .network {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .loading { text-align: center; color: #666; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Custom WiFi Manager</h1>
        <p>This is a custom frontend served from SPIFFS</p>

        <div class="status">
            <h3>Status</h3>
            <p><strong>State:</strong> <span id="state">Loading...</span></p>
            <p><strong>SSID:</strong> <span id="ssid">-</span></p>
            <p><strong>IP:</strong> <span id="ip">-</span></p>
            <p><strong>Signal:</strong> <span id="signal">-</span></p>
        </div>

        <button onclick="scan()">Scan Networks</button>
        <button onclick="disconnect()">Disconnect</button>

        <div class="networks" id="networks">
            <p class="loading">Click "Scan Networks" to find WiFi</p>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modal-ssid">Connect to WiFi</h3>
            <input type="password" id="password" placeholder="Password">
            <button onclick="connect()">Connect</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        const API = '/api/wifi';
        let selectedSSID = '';

        async function getStatus() {
            try {
                const res = await fetch(`${API}/status`);
                const data = await res.json();
                document.getElementById('state').textContent = data.state;
                document.getElementById('ssid').textContent = data.ssid || '-';
                document.getElementById('ip').textContent = data.ip || '-';
                document.getElementById('signal').textContent = data.quality ? `${data.quality}%` : '-';
            } catch (e) {
                console.error('Status error:', e);
            }
        }

        async function scan() {
            document.getElementById('networks').innerHTML = '<p class="loading">Scanning...</p>';
            try {
                const res = await fetch(`${API}/scan`);
                const data = await res.json();
                let html = '';
                for (const net of data.networks) {
                    html += `<div class="network">
                        <span>${net.ssid || '(hidden)'} (${net.rssi} dBm)</span>
                        <button onclick="showConnect('${net.ssid}')">Connect</button>
                    </div>`;
                }
                document.getElementById('networks').innerHTML = html || '<p>No networks found</p>';
            } catch (e) {
                document.getElementById('networks').innerHTML = '<p>Scan failed</p>';
            }
        }

        function showConnect(ssid) {
            selectedSSID = ssid;
            document.getElementById('modal-ssid').textContent = `Connect to: ${ssid}`;
            document.getElementById('password').value = '';
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        async function connect() {
            const password = document.getElementById('password').value;
            closeModal();
            try {
                await fetch(`${API}/networks`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ssid: selectedSSID, password, priority: 10})
                });
                await fetch(`${API}/connect`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ssid: selectedSSID})
                });
                alert('Connecting...');
            } catch (e) {
                alert('Connection failed');
            }
        }

        async function disconnect() {
            try {
                await fetch(`${API}/disconnect`, {method: 'POST'});
                alert('Disconnected');
                getStatus();
            } catch (e) {
                alert('Error');
            }
        }

        // Initial load
        getStatus();
        setInterval(getStatus, 5000);
    </script>
</body>
</html>
